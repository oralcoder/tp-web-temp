services:
  # ========================================
  # React 프론트엔드 서버 (개발 모드)
  # ========================================
  tp-web:
    # Node.js 18 기반 이미지
    image: node:20-alpine
    
    # 컨테이너 이름 지정
    container_name: tp-web
    
    # 컨테이너 재시작 정책
    restart: unless-stopped
    
    # 작업 디렉토리 설정
    working_dir: /app
    
    # 볼륨 마운트 (소스 코드 실시간 반영)
    volumes:
      # React 소스코드 마운트
      - ./frontend:/app
      - node_modules_tp_web:/app/node_modules
    
    # 포트 매핑 (호스트:컨테이너)
    ports:
      - "5173:5173"  # Vite 기본 포트
    
    # 컨테이너 실행 명령어
    # npm install 후 개발 서버 실행
    command: sh -c "npm ci || npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    
    # 환경변수 설정
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    
    # 네트워크 설정
    networks:
      - mes-network

# ========================================
# Docker 볼륨 
# ========================================
volumes:
  node_modules_tp_web:

# ========================================
# 네트워크 정의
# ========================================
networks:
  mes-network:
    # 네트워크 이름
    name: mes-network
    
    # 브릿지 네트워크 (기본값)
    driver: bridge